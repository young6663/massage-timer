<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<meta name="theme-color" content="#0A0C10">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="按摩計時器">
<title>按摩計時器｜語音報時</title>
<style>
  :root{
    --bg:#0A0C10;          /* 近黑深藍，最高對比底色 */
    --panel:#141821;
    --text:#FFFFFF;
    --dim:#9AA4B2;
    --gold:#FFC53D;        /* 主要動作：溫暖金黃，黑字對比 12:1 以上 */
    --gold-press:#E5AC1F;
    --stop:#FF6B6B;
    --stop-press:#E04F4F;
    --focus:#4DD0E1;       /* 鍵盤焦點：亮青色粗框 */
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html{font-size:18px;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:"PingFang TC","Microsoft JhengHei",system-ui,-apple-system,sans-serif;
    min-height:100vh;
    display:flex; flex-direction:column; align-items:center;
    padding:1rem 1rem 3rem;
  }
  header{width:100%; max-width:560px; text-align:center; padding:.8rem 0 1.2rem;}
  h1{font-size:1.5rem; font-weight:700; letter-spacing:.08em;}
  h1 .sub{display:block; font-size:.85rem; color:var(--dim); font-weight:400; margin-top:.35rem; letter-spacing:.15em;}

  main{width:100%; max-width:560px; display:flex; flex-direction:column; gap:1rem;}

  /* 剩餘時間大字顯示 */
  #clockCard{
    background:var(--panel);
    border-radius:20px;
    padding:1.4rem 1rem;
    text-align:center;
  }
  #remain{
    font-size:clamp(3.5rem, 18vw, 6rem);
    font-weight:800;
    font-variant-numeric:tabular-nums;
    letter-spacing:.04em;
    line-height:1.1;
  }
  #phase{font-size:1.1rem; color:var(--gold); margin-top:.4rem; min-height:1.5em; font-weight:600;}
  #status{font-size:1rem; color:var(--dim); margin-top:.3rem; min-height:1.4em;}

  /* 主要按鈕：整排超大 */
  .btnRow{display:flex; flex-direction:column; gap:.9rem;}
  button{
    font-family:inherit;
    border:none;
    border-radius:18px;
    cursor:pointer;
    -webkit-tap-highlight-color:transparent;
  }
  button:focus-visible{outline:5px solid var(--focus); outline-offset:3px;}
  .startBtn{
    background:var(--gold);
    color:#141414;
    font-size:1.9rem;
    font-weight:800;
    padding:1.3rem;
    letter-spacing:.05em;
  }
  .startBtn:active{background:var(--gold-press);}
  .startBtn small{display:block; font-size:.85rem; font-weight:600; margin-top:.25rem; opacity:.75; letter-spacing:.1em;}
  #stopBtn{
    background:var(--stop);
    color:#141414;
    font-size:1.6rem;
    font-weight:800;
    padding:1.1rem;
    display:none;
  }
  #stopBtn:active{background:var(--stop-press);}
  .running #stopBtn{display:block;}
  .running .startBtn{display:none;}

  /* 次要區 */
  #tools{
    background:var(--panel);
    border-radius:16px;
    padding:1rem;
    display:flex; flex-direction:column; gap:.8rem;
  }
  #tools h2{font-size:1rem; color:var(--dim); font-weight:600; letter-spacing:.1em;}
  .toolBtn{
    background:#232937;
    color:var(--text);
    font-size:1.1rem;
    font-weight:600;
    padding:.9rem;
  }
  .toolBtn:active{background:#2E3646;}
  label{font-size:.95rem; color:var(--dim);}
  select{
    width:100%; font-size:1rem; padding:.7rem;
    border-radius:12px; border:1px solid #333B4B;
    background:#1B2130; color:var(--text);
  }
  select:focus-visible{outline:5px solid var(--focus); outline-offset:2px;}

  .tips{max-width:560px; width:100%; color:var(--dim); font-size:.9rem; line-height:1.7; margin-top:1.2rem;}
  .tips strong{color:var(--gold);}
  .sr-only{
    position:absolute; width:1px; height:1px;
    padding:0; margin:-1px; overflow:hidden;
    clip:rect(0 0 0 0); white-space:nowrap; border:0;
  }
  @media (prefers-reduced-motion:no-preference){
    .running #remain{transition:opacity .3s;}
  }
</style>
</head>
<body>

<header>
  <h1>按摩計時器<span class="sub">每 10 分鐘語音報時・最後 3 分鐘逐分倒數</span></h1>
</header>

<main id="app">
  <section id="clockCard" aria-label="剩餘時間顯示">
    <div id="remain">--:--</div>
    <div id="phase"></div>
    <div id="status">請選擇療程時間開始計時</div>
  </section>

  <div class="btnRow" id="startRow">
    <button class="startBtn" data-min="30">30 分鐘<small>快速鍵：數字 1</small></button>
    <button class="startBtn" data-min="60">60 分鐘<small>快速鍵：數字 2</small></button>
    <button class="startBtn" data-min="90">90 分鐘<small>快速鍵：數字 3</small></button>
    <button id="stopBtn">停止計時（快速鍵：0 或 Esc）</button>
  </div>

  <section id="tools" aria-label="設定與測試">
    <h2>設定與測試</h2>
    <button class="toolBtn" id="testBtn">播放測試：音效＋語音（快速鍵：T）</button>
    <div>
      <label for="voiceSel">語音音色（自動挑選最佳台灣中文語音，可手動更換）</label>
      <select id="voiceSel" aria-label="選擇語音音色"></select>
    </div>
  </section>
</main>

<div class="tips">
  <p><strong>使用提醒：</strong>開始計時前，請把手機「媒體音量」調到約七至八成（不需要推到最頂，內建的音量壓縮器會讓提示音飽滿清晰又不破音）。計時期間本工具會自動保持螢幕喚醒、持續佔用音訊通道，提示音不會被系統調小。全程離線運作，不需要網路。</p>
  <p><strong>報時規則：</strong>開始有鐘聲加簡短語音；每滿 10 分鐘輕聲報「剩幾分鐘」；最後 3 分鐘不說話，改用音階暗號——剩 3 分是 Do、剩 2 分是 Re、剩 1 分是 Mi，音愈高代表愈接近結束；時間到說「時間到」並播放約十秒輕柔旋律。</p>
</div>

<script>
(function(){
"use strict";

/* ========= 狀態 ========= */
const S = {
  running:false,
  startTime:0,        // 絕對時間戳，防漂移的核心
  totalMin:0,
  points:[],          // 預先算好的報時點 [{min, say, sound}]
  announced:new Set(),
  tickTimer:null,
  wakeLock:null,
  keepAlive:null
};

const $remain = document.getElementById('remain');
const $phase  = document.getElementById('phase');
const $status = document.getElementById('status');
const $app    = document.getElementById('app');
const $voice  = document.getElementById('voiceSel');

/* ========= 真人語音包（若已用 Python 腳本注入，優先使用） ========= */
const PACK = (typeof window.VOICE_PACK === 'object' && window.VOICE_PACK) ? window.VOICE_PACK : null;
const packPlayer = new Audio();
packPlayer.volume = 1;

function playPack(key){
  packPlayer.src = PACK[key];
  packPlayer.currentTime = 0;
  packPlayer.play().catch(()=>{});
}

/* 統一發聲入口：有語音包用語音包（真人級音質、與螢幕報讀器完全分流），
   沒有語音包、或該句不在包內（極少數補報情況）則退回系統語音合成 */
function say(key, fallbackText){
  if (PACK && PACK[key]) playPack(key);
  else speak(fallbackText);
}

/* ========= 語音引擎解鎖（修正「按下只有音效、沒有語音」的問題）
   Android Chrome 規定：語音合成第一次發聲必須發生在使用者手勢當下，
   延遲兩秒後才唸就會被封鎖。因此在每次按鈕按下的瞬間，
   先無聲地「暖機」一次，之後的延遲語音就能正常發聲。 ========= */
let speechPrimed = false;
function primeSpeech(){
  if (speechPrimed) return;
  try{
    const u = new SpeechSynthesisUtterance(' ');
    u.volume = 0;
    speechSynthesis.speak(u);
    speechPrimed = true;
  }catch(e){}
  /* 語音包的 Audio 元素也需要在手勢中解鎖一次 */
  if (PACK){
    try{ packPlayer.play().catch(()=>{}); packPlayer.pause(); }catch(e){}
  }
}

/* ========= 語音（Web Speech API，備援用） ========= */
let voices = [];
let chosenVoice = null;

function loadVoices(){
  voices = speechSynthesis.getVoices().filter(v =>
    /^zh([-_](TW|HK|CN|Hant|Hans))?/i.test(v.lang) || /中文|國語|粵|Chinese/i.test(v.name)
  );
  // 排序：台灣中文優先，再來是名稱含「美佳 / Mei-Jia / Enhanced / Premium / Google」的高品質語音
  const score = v => {
    let s = 0;
    if (/tw|hant/i.test(v.lang)) s += 100;
    if (/美佳|mei-?jia/i.test(v.name)) s += 50;
    if (/enhanced|premium|natural/i.test(v.name)) s += 40;
    if (/google/i.test(v.name)) s += 30;
    if (v.localService) s += 20; // 本機語音 = 離線可用，加分
    return s;
  };
  voices.sort((a,b)=>score(b)-score(a));

  $voice.innerHTML = '';
  voices.forEach((v,i)=>{
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = v.name + '（' + v.lang + (v.localService ? '・離線' : '・需網路') + '）';
    $voice.appendChild(opt);
  });
  if (voices.length){
    chosenVoice = voices[0];
    $voice.value = 0;
  }
}
loadVoices();
if (typeof speechSynthesis !== 'undefined'){
  speechSynthesis.onvoiceschanged = loadVoices;
}
$voice.addEventListener('change', ()=>{
  chosenVoice = voices[Number($voice.value)] || null;
  speak('您好，我是新的語音音色，請多指教。');
});

function speak(text){
  try{
    const go = ()=>{
      const u = new SpeechSynthesisUtterance(text);
      u.lang = 'zh-TW';
      u.volume = 1;      // 最大音量
      u.rate = 0.95;     // 稍慢，聽得更清楚
      u.pitch = 1.0;
      if (chosenVoice) u.voice = chosenVoice;
      speechSynthesis.speak(u);
    };
    /* Android 已知問題：cancel() 後立刻 speak() 會整句掉字，需隔一小段時間 */
    if (speechSynthesis.speaking || speechSynthesis.pending){
      speechSynthesis.cancel();
      setTimeout(go, 120);
    } else {
      go();
    }
  }catch(e){ /* 靜默失敗不影響計時 */ }
}

/* ========= 音效（Web Audio 合成鐘聲，離線、免載檔） ========= */
let ctx = null;
let masterBus = null;

function ensureAudio(){
  if (!ctx){
    ctx = new (window.AudioContext || window.webkitAudioContext)();
    /* 動態壓縮器：音量飽滿但絕不削波破音（小喇叭手機的關鍵） */
    const comp = ctx.createDynamicsCompressor();
    comp.threshold.value = -20;
    comp.knee.value = 15;
    comp.ratio.value = 8;
    comp.attack.value = 0.003;
    comp.release.value = 0.25;
    masterBus = ctx.createGain();
    masterBus.gain.value = 0.55;   /* 總輸出留足夠空間，避免推爆喇叭 */
    masterBus.connect(comp);
    comp.connect(ctx.destination);
  }
  if (ctx.state === 'suspended') ctx.resume();
}

/* 溫暖鐘聲：基音 + 泛音，指數衰減 */
function bell(freq, when, dur, vol){
  const t = ctx.currentTime + when;
  const master = ctx.createGain();
  master.gain.setValueAtTime(vol, t);
  master.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  master.connect(masterBus);

  [[1, 1.0],[2.0, 0.28],[2.76, 0.12]].forEach(([mult, g])=>{
    const o = ctx.createOscillator();
    o.type = 'sine';
    o.frequency.value = freq * mult;
    const og = ctx.createGain();
    og.gain.value = g;
    o.connect(og); og.connect(master);
    o.start(t); o.stop(t + dur);
  });
}

/* 三種提示音型 */
const SOUND = {
  /* 開始／每10分鐘：溫和的雙音（Mi→La），像飯店櫃檯鈴 */
  mark(){ ensureAudio(); bell(659.25, 0,   1.4, 0.5); bell(880.00, 0.45, 1.8, 0.5); },
  /* 最後3分鐘音階暗號（不說話，顧客聽來只是輕柔鈴聲）：
     剩3分=Do、剩2分=Re、剩1分=Mi，音愈高代表愈接近結束 */
  scale(left){
    ensureAudio();
    const freq = { 3: 523.25, 2: 587.33, 1: 659.25 }[left] || 523.25;
    bell(freq, 0, 2.0, 0.45);
  },
  /* 結束：約10秒輕柔五聲音階旋律，spa 風格收尾 */
  music(){
    ensureAudio();
    const M = [
      [523.25, 0.0, 1.6], [659.25, 0.7, 1.6], [783.99, 1.4, 1.8],
      [880.00, 2.2, 2.0], [783.99, 3.1, 1.6], [659.25, 3.8, 1.6],
      [783.99, 4.6, 1.8], [1046.5, 5.5, 2.2], [880.00, 6.4, 1.8],
      [783.99, 7.2, 1.8], [659.25, 8.0, 1.8], [587.33, 8.8, 1.8],
      [523.25, 9.6, 3.0]
    ];
    M.forEach(([f, t, d]) => bell(f, t, d, 0.4));
  }
};

/* 音訊保活：播放循環無聲音軌，讓瀏覽器維持音訊工作階段（iOS 關鍵） */
function startKeepAlive(){
  ensureAudio();
  stopKeepAlive();
  const buf = ctx.createBuffer(1, ctx.sampleRate, ctx.sampleRate);
  const src = ctx.createBufferSource();
  src.buffer = buf; src.loop = true;
  const g = ctx.createGain();
  g.gain.value = 0.001;
  src.connect(g); g.connect(ctx.destination);
  src.start();
  S.keepAlive = src;
}
function stopKeepAlive(){
  if (S.keepAlive){ try{ S.keepAlive.stop(); }catch(e){} S.keepAlive = null; }
}

/* ========= 螢幕保持喚醒（Wake Lock） ========= */
async function acquireWakeLock(){
  try{
    if ('wakeLock' in navigator){
      S.wakeLock = await navigator.wakeLock.request('screen');
    }
  }catch(e){ /* 不支援也不影響核心計時 */ }
}
function releaseWakeLock(){
  if (S.wakeLock){ S.wakeLock.release().catch(()=>{}); S.wakeLock = null; }
}
document.addEventListener('visibilitychange', ()=>{
  if (document.visibilityState === 'visible' && S.running){
    acquireWakeLock();
    ensureAudio();
    tick(); // 回到前景立刻校正並補報
  }
});

/* ========= 報時點規劃（只記觸發點，報詞在開口當下即時計算） ========= */
function buildPoints(totalMin){
  const pts = [];
  for (let m = 10; m <= totalMin - 10; m += 10){
    pts.push({ min:m, sound:'mark' });
  }
  [3,2,1].forEach(left=>{
    pts.push({ min: totalMin - left, sound:'urgent' });
  });
  pts.sort((a,b)=>a.min-b.min);
  return pts;
}

/* ========= 核心計時（絕對時間戳） ========= */
function start(totalMin){
  ensureAudio();           // 必須在使用者手勢中初始化音訊
  startKeepAlive();
  acquireWakeLock();

  S.running = true;
  S.totalMin = totalMin;
  S.startTime = Date.now();
  S.points = buildPoints(totalMin);
  S.announced = new Set();

  $app.classList.add('running');
  $phase.textContent = totalMin + ' 分鐘療程進行中';
  setStatus('計時中，每 10 分鐘會語音報時');

  SOUND.mark();
  /* 延後開口，讓 TalkBack／VoiceOver 先唸完按鈕名稱，避免語音互相打斷 */
  setTimeout(()=> say('start' + totalMin, '計時 ' + totalMin + ' 分鐘，開始。'), 2000);

  clearInterval(S.tickTimer);
  S.tickTimer = setInterval(tick, 500);
  tick();
}

function tick(){
  if (!S.running) return;

  /* Safari 偶發 speechSynthesis 暫停的已知問題，主動喚醒 */
  if (typeof speechSynthesis !== 'undefined' && speechSynthesis.paused){
    speechSynthesis.resume();
  }

  const elapsedMs  = Date.now() - S.startTime;
  const totalMs    = S.totalMin * 60000;
  const remainMs   = Math.max(0, totalMs - elapsedMs);
  const elapsedMin = Math.floor(elapsedMs / 60000);

  renderRemain(remainMs);

  /* 檢查應報而未報的節點；若曾被暫停漏掉多個，只補報最新一個，不會連珠炮 */
  const due = S.points.filter(p => p.min <= elapsedMin && !S.announced.has(p.min));
  if (due.length){
    due.forEach(p => S.announced.add(p.min));
    const latest = due[due.length - 1];
    /* 報詞在此刻即時計算，確保與實際時間一致 */
    const remainMinNow = Math.round(remainMs / 60000);
    if (remainMinNow > 0){
      if (latest.sound === 'urgent'){
        /* 最後3分鐘：只放 Do／Re／Mi 音階暗號，不說話，維持放鬆氛圍 */
        SOUND.scale(remainMinNow);
        setStatus('剩 ' + remainMinNow + ' 分鐘（音階提示）');
      } else {
        SOUND.mark();
        setTimeout(()=> say('r' + remainMinNow, '剩 ' + remainMinNow + ' 分鐘。'), 1300);
        setStatus('剩 ' + remainMinNow + ' 分鐘');
      }
    }
  }

  if (remainMs <= 0){
    finish();
  }
}

function finish(){
  stopTicking();
  $phase.textContent = '療程結束';
  $remain.textContent = '00:00';
  setStatus('時間到');
  setTimeout(()=> say('finish', '時間到。'), 300);
  /* 語音說完後，播放約10秒輕柔旋律收尾 */
  setTimeout(()=> SOUND.music(), 2200);
  /* 結束後 30 秒再收掉保活與喚醒鎖，確保音樂完整播完 */
  setTimeout(()=>{ stopKeepAlive(); releaseWakeLock(); }, 30000);
}

function stop(){
  if (!S.running) return;
  const elapsedMin = Math.floor((Date.now() - S.startTime) / 60000);
  stopTicking();
  stopKeepAlive();
  releaseWakeLock();
  $remain.textContent = '--:--';
  $phase.textContent = '';
  setStatus('已手動停止計時');
  say('stopped', '已停止。');
}

function stopTicking(){
  S.running = false;
  clearInterval(S.tickTimer);
  S.tickTimer = null;
  $app.classList.remove('running');
}

function renderRemain(ms){
  const totalSec = Math.ceil(ms / 1000);
  const mm = String(Math.floor(totalSec / 60)).padStart(2,'0');
  const ss = String(totalSec % 60).padStart(2,'0');
  $remain.textContent = mm + ':' + ss;
}

function setStatus(text){
  $status.textContent = text;
}

/* ========= 綁定 ========= */
document.querySelectorAll('.startBtn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    primeSpeech();                 // 手勢當下解鎖語音引擎（關鍵修正）
    start(Number(btn.dataset.min));
  });
});
document.getElementById('stopBtn').addEventListener('click', ()=>{
  primeSpeech();
  stop();
});
document.getElementById('testBtn').addEventListener('click', ()=>{
  primeSpeech();
  ensureAudio();
  SOUND.mark();
  setTimeout(()=> say('test', '測試正常。'), 2000);
});

/* 語音包已啟用時，隱藏系統語音選單並標示 */
if (PACK){
  const sel = document.getElementById('voiceSel');
  const lbl = document.querySelector('label[for="voiceSel"]');
  sel.style.display = 'none';
  lbl.textContent = '真人語音包已啟用（曉臻・台灣女聲），不需選擇系統語音。';
}

document.addEventListener('keydown', e=>{
  if (e.target.tagName === 'SELECT') return;
  primeSpeech();
  switch(e.key){
    case '1': if(!S.running) start(30); break;
    case '2': if(!S.running) start(60); break;
    case '3': if(!S.running) start(90); break;
    case '0':
    case 'Escape': stop(); break;
    case 't': case 'T':
      document.getElementById('testBtn').click(); break;
  }
});

})();

/* PWA 離線快取註冊：部署在 GitHub Pages（https）時生效；
   直接開本機檔案時自動略過，不影響使用 */
if ('serviceWorker' in navigator && location.protocol === 'https:') {
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}
